name: "Artifact-Driven Simulation Engine"

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  gatekeeper:
    name: "🛑 Engine Gatekeeper"
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4

      # Rule 1: Isolation Mandate. 
      - name: 🔍 Check Dormancy Flag
        id: check
        run: |
          FLAG_PATH="config/dormant.flag"
          
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [ -f "$FLAG_PATH" ] && grep -q "STATUS: DORMANT" "$FLAG_PATH"; then
              echo "status=dormant" >> $GITHUB_OUTPUT
              echo "🛑 ENGINE DORMANT: Status set to DORMANT. Halting pulse."
            else
              echo "status=active" >> $GITHUB_OUTPUT
              echo "🚀 ENGINE ACTIVE: No dormancy signal found. Proceeding."
            fi
          else
            echo "status=active" >> $GITHUB_OUTPUT
            echo "🚀 AUTO-WAKE: Manual or Push trigger detected."
          fi

  pre_flight_tests:
    name: "🧪 Pre-Flight: Logic & Hygiene"
    needs: gatekeeper
    if: needs.gatekeeper.outputs.status == 'active'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # "pytest -s tests/ -vv --cov=src --cov-report=term-missing"
      TEST_COMMAND: "pytest -s tests/ -vv --cov=src --cov-report=term-missing"
    
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Auto-Clean (Autoflake)
        run: autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests

      - name: 🧹 Static Analysis & Lint (Ruff)
        run: ruff check src tests --fix

      - name: 🚀 Commit & Push Hygiene Changes
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🧹 Auto-clean: structural hygiene [Engine]"
            git push || echo "Push skipped."
          fi

      - name: 💀 Dead Code Audit (Vulture)
        id: vulture
        run: |
          # Rule 2: Zero-Debt Mandate. Detect unreachable code.
          vulture src --min-confidence 70

      - name: 🧪 Quality Gate Check (Rule 2)
        if: failure() && steps.vulture.outcome == 'failure'
        run: |
          echo "CRITICAL: Rule 2 (Zero-Debt Mandate) violation."
          echo "Unused code detected in src/. Delete unreachable logic before continuing."
          exit 1

      - name: 🧪 Run Logic & Scientific Verification
        run: |
          echo "🚀 Initiating: $TEST_COMMAND"
          $TEST_COMMAND
      
      - name: 🔍 Forensic Audit
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All systems nominal. No anomalies detected in solver lifecycle."
            cat <<EOF > src/debug/forensic_audit.sh
          #!/bin/bash
          # Description: Automated forensic audit for Navier-Stokes solver failures.
          # Status: Dormant (All systems nominal)
          exit 0
          EOF
            chmod +x src/debug/forensic_audit.sh
            echo "🧹 Diagnostic script has been reset to Dormant mode."
          else
            echo "⚠️ CI Failure Detected. Initiating Deep Forensic Audit..."
            echo "============================================================"
            echo "ls -R output:"
            ls -R
            echo "============================================================"
            echo "src/debug/forensic_audit.sh run results:"
            if [ -f "src/debug/forensic_audit.sh" ]; then
              bash src/debug/forensic_audit.sh
            else
              echo "❌ Critical: Diagnostic script 'src/debug/forensic_audit.sh' not found."
            fi
            echo "============================================================"
            echo "📉 RE-RUNNING FAILED TEST FOR FINAL SIGNAL"
            $TEST_COMMAND || true
            exit 1
          fi
      
      - name: 🧹 Sync Forensic Reset
        if: success()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Setup Identity
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"

          # 2. Ensure the file is staged (The '🔍 Forensic Audit' step already created it)
          git add src/debug/forensic_audit.sh
          
          # 3. Commit and Push ONLY the Forensic Reset
          if [ -n "$(git status --porcelain src/debug/forensic_audit.sh)" ]; then
            git commit -m "🧹 forensic: reset diagnostic script to dormant [PASS]"
            git push origin HEAD || echo "Push skipped: Concurrent push detected."
          else
            echo "✅ Forensic script already in dormant mode. No sync needed."
          fi

  production_run:
    name: "🚀 Production: Physics Execution"
    needs: pre_flight_tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DROPBOX_APP_KEY: ${{ secrets.APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}
    
    steps:
      - name: 🗂️ Checkout Engine
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 📥 Synchronize Input (Dropbox)
        env:
          APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          ./src/download_from_dropbox.sh

      - name: ⚡ Execute Sovereign Logic Gate
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 src/main_engine.py

      - name: 📊 Sync Audit, Ledger & Dormancy State
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          
          # TARGET ONLY CORE ARTIFACTS (Avoids __pycache__ noise)
          git add performance_audit.md config/dormant.flag config/orchestration_ledger.json
          
          # CHECK IF THESE SPECIFIC FILES HAVE CHANGES
          if ! git diff --cached --exit-code; then
            git stash
            git pull origin HEAD --rebase
            git stash pop
            
            # Re-add after rebase to ensure clean state
            git add performance_audit.md config/dormant.flag config/orchestration_ledger.json
            git commit -m "📊 audit: cycle complete | Project ID verified [${{ job.status }}]"
            git push origin HEAD
          else
            echo "✅ No core state changes detected. Skipping sync."
          fi